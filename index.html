<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mcell — Gestão de Vendas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

<!-- ═══════════════════════════════════════════════════
     LOGIN SCREEN
════════════════════════════════════════════════════ -->
<div id="login-screen" class="login-screen">
  <div class="login-bg">
    <div class="login-orb login-orb-1"></div>
    <div class="login-orb login-orb-2"></div>
  </div>
  <div class="login-card">
    <div class="login-logo">
      <span class="logo-icon">◆</span>
      <span class="logo-text">Mcell</span>
    </div>
    <p class="login-tagline">Sistema de Gestão de Vendas</p>
    <div class="form-group">
      <label>E-mail</label>
      <input type="email" id="login-email" placeholder="seu@email.com" autocomplete="username"/>
    </div>
    <div class="form-group">
      <label>Senha</label>
      <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password"/>
    </div>
    <div id="login-error" class="login-error hidden"></div>
    <button class="btn-primary btn-full" id="btn-login">Entrar</button>
    <p class="login-footer">Mcell © 2026 — Acesso restrito</p>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════
     APP SHELL
════════════════════════════════════════════════════ -->
<div id="app" class="app hidden">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <span class="logo-icon">◆</span>
        <span class="logo-text">Mcell</span>
      </div>
      <button class="sidebar-close" id="sidebar-close">✕</button>
    </div>

    <nav class="sidebar-nav">
      <a href="#" class="nav-item active" data-page="dashboard">
        <span class="nav-icon">⬡</span> Dashboard
      </a>
      <a href="#" class="nav-item" data-page="vendas">
        <span class="nav-icon">◈</span> Registrar Venda
      </a>
      <a href="#" class="nav-item" data-page="vendedoras" id="nav-vendedoras">
        <span class="nav-icon">◉</span> Vendedoras
      </a>
      <a href="#" class="nav-item" data-page="metas" id="nav-metas">
        <span class="nav-icon">◎</span> Metas
      </a>
      <a href="#" class="nav-item" data-page="relatorios">
        <span class="nav-icon">◫</span> Relatórios
      </a>
    </nav>

    <div class="sidebar-user">
      <div class="user-avatar" id="user-avatar">A</div>
      <div class="user-info">
        <div class="user-name" id="user-name">Admin</div>
        <div class="user-role" id="user-role">Administrador</div>
      </div>
      <button class="btn-logout" id="btn-logout" title="Sair">⏻</button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main-content">
    <header class="topbar">
      <button class="menu-toggle" id="menu-toggle">☰</button>
      <div class="topbar-title" id="topbar-title">Dashboard</div>
      <div class="topbar-month">
        <select id="month-select" class="month-selector"></select>
      </div>
    </header>

    <!-- PAGES -->
    <div class="page active" id="page-dashboard"></div>
    <div class="page" id="page-vendas"></div>
    <div class="page" id="page-vendedoras"></div>
    <div class="page" id="page-metas"></div>
    <div class="page" id="page-relatorios"></div>
  </main>
</div>

<!-- ═══════════════════════════════════════════════════
     MODAL
════════════════════════════════════════════════════ -->
<div id="modal-overlay" class="modal-overlay hidden">
  <div class="modal-box" id="modal-box">
    <button class="modal-close" id="modal-close">✕</button>
    <div id="modal-content"></div>
  </div>
</div>

<!-- TOAST -->
<div id="toast" class="toast hidden"></div>

<script src="supabase-config.js"></script>
<script src="auth.js"></script>
<script src="dashboard.js"></script>
<script src="vendas.js"></script>
<script src="vendedoras.js"></script>
<script src="metas.js"></script>
<script src="relatorios.js"></script>
<script src="app.js"></script>
</body>
</html>
